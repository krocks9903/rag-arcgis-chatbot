# Local Docker stack (free) — API + static frontend
#
# Usage:
#   1. Copy backend/.env.example → backend/.env and set GROQ_API_KEY
#   2. docker compose up --build
#   3. Open http://localhost:3000 (frontend)  API: http://localhost:8080
#
# First build downloads ML models and bakes the FAISS index (~15–25 min).
# Later builds use Docker layer cache.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-arcgis-chatbot:local
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      SERVE_FRONTEND: "false"
      PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
