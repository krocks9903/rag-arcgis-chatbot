name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend/data/gold/meetings_ai_public.csv"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/pipeline-refresh.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: >-
      ${{
        vars.ENABLE_DEPLOY == 'true' &&
        secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
        secrets.GCP_SERVICE_ACCOUNT != ''
      }}
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build & push image
        run: |
          gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/rag-arcgis-chatbot:${{ github.sha }}"
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 4Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 300 \
            --cpu-boost \
            --startup-probe=initialDelaySeconds=0,timeoutSeconds=10,periodSeconds=10,failureThreshold=30,httpGet.port=8080,httpGet.path=/ready \
            --set-env-vars "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},SERVE_FRONTEND=true,EMBEDDING_MODEL=BAAI/bge-small-en-v1.5,RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2,CRAG_MAX_ITERS=1,RERANK_CANDIDATES=8,DENSE_K=12,SPARSE_K=12"
