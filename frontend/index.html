<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot + ArcGIS Map</title>

  <!-- ArcGIS JS API (free, CDN) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --border: #2a2d3e;
      --accent: #4f8ef7;
      --accent-dim: #2a4a8a;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --user-bubble: #1e3a6e;
      --bot-bubble: #1e2130;
      --source: #0e1620;
      --success: #22c55e;
      --radius: 12px;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

    /* ── Layout ── */
    #app {
      display: grid;
      grid-template-columns: 420px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    header .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    header .logo span { color: var(--accent); }
    header .badge {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 99px; padding: 2px 8px;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444; margin-left: auto;
      transition: background 0.3s;
    }
    #status-dot.online { background: var(--success); }
    #status-label { font-size: 0.78rem; color: var(--text-muted); }

    /* ── Chat Panel ── */
    #chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--accent-dim); color: var(--accent); }
    .msg.bot .avatar { background: #2a2d3e; color: var(--text-muted); }

    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.55;
    }
    .msg.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
    .msg.bot .bubble { background: var(--bot-bubble); border-bottom-left-radius: 4px; }

    .sources {
      margin-top: 8px;
      background: var(--source);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .sources strong { color: var(--accent); display: block; margin-bottom: 4px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.6px; }
    .source-item { padding: 2px 0; border-bottom: 1px solid var(--border); }
    .source-item:last-child { border-bottom: none; }

    /* typing indicator */
    .typing-dots span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted); margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Input area ── */
    #input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--panel);
    }
    #question-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.875rem;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      font-family: var(--font);
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    #question-input:focus { outline: none; border-color: var(--accent); }
    #question-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── CSV loader ── */
    #csv-bar {
      padding: 10px 16px;
      background: var(--source);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #csv-bar label { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
    #csv-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 0.8rem;
      font-family: var(--font);
    }
    #csv-input:focus { outline: none; border-color: var(--accent); }
    #load-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #load-btn:hover { background: var(--accent-dim); }

    /* ── Map Panel ── */
    #map-panel { position: relative; overflow: hidden; }
    #arcgis-map { width: 100%; height: 100%; }

    /* Map overlay label */
    #map-label {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(15,17,23,0.85);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      pointer-events: none;
      z-index: 5;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">RAG<span>Map</span></div>
    <div class="badge">LangChain · FAISS · ArcGIS</div>
    <div id="status-dot"></div>
    <span id="status-label">Checking backend…</span>
  </header>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="messages">
      <div class="msg bot">
        <div class="avatar">AI</div>
        <div class="bubble">
          👋 Hi! I'm your RAG assistant. I can answer questions about the data in your CSV.
          Use the bar below to load a different CSV, or just start asking questions!
        </div>
      </div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <textarea id="question-input" placeholder="Ask a question about your data…" rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <!-- CSV Loader -->
    <div id="csv-bar">
      <label>CSV file:</label>
      <input id="csv-input" type="text" value="data.csv" placeholder="filename in /data folder" />
      <button id="load-btn">Load</button>
    </div>
  </div>

  <!-- ArcGIS Map -->
  <div id="map-panel">
    <div id="map-label">🗺 ArcGIS Map</div>
    <div id="arcgis-map"></div>
  </div>

</div>

<script>
  const API = "http://localhost:8000";

  // ── Status ping ──
  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      document.getElementById("status-dot").className = "online";
      document.getElementById("status-label").textContent =
        d.index_loaded ? "Backend online · data loaded" : "Backend online · no data";
    } catch {
      document.getElementById("status-label").textContent = "Backend offline";
    }
  }
  checkHealth();
  setInterval(checkHealth, 15000);

  // ── ArcGIS Map init ──
  require([
    "esri/Map",
    "esri/views/MapView",
    "esri/layers/FeatureLayer",
  ], function (Map, MapView, FeatureLayer) {

    const map = new Map({ basemap: "dark-gray-vector" });

    const view = new MapView({
      container: "arcgis-map",
      map: map,
      center: [-82.4139, 28.0587], // ← update to your area
      zoom: 13,
    });

    // TODO: Replace with your ArcGIS Feature Layer URL
    // const layer = new FeatureLayer({
    //   url: "https://services.arcgis.com/YOUR_LAYER_URL/FeatureServer/0"
    // });
    // map.add(layer);

    view.ui.move("zoom", "bottom-right");
  });

  // ── Chat logic ──
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("question-input");
  const sendBtn    = document.getElementById("send-btn");

  function addMessage(role, html, sources = []) {
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;
    const avatar = role === "user" ? "You" : "AI";
    let sourcesHtml = "";
    if (sources.length) {
      sourcesHtml = `<div class="sources">
        <strong>Sources</strong>
        ${sources.map(s => `<div class="source-item">${s}</div>`).join("")}
      </div>`;
    }
    msg.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div>
        <div class="bubble">${html}</div>
        ${sourcesHtml}
      </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function addTyping() {
    return addMessage("bot", `<div class="typing-dots"><span></span><span></span><span></span></div>`);
  }

  async function sendQuestion() {
    const q = inputEl.value.trim();
    if (!q) return;
    inputEl.value = "";
    sendBtn.disabled = true;
    addMessage("user", q);
    const typingMsg = addTyping();

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q }),
      });
      const data = await res.json();
      typingMsg.remove();
      if (res.ok) {
        addMessage("bot", data.answer, data.sources);
      } else {
        addMessage("bot", `⚠️ Error: ${data.detail}`);
      }
    } catch (e) {
      typingMsg.remove();
      addMessage("bot", "⚠️ Could not reach the backend. Is it running on port 8000?");
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", sendQuestion);
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // ── CSV loader ──
  document.getElementById("load-btn").addEventListener("click", async () => {
    const filename = document.getElementById("csv-input").value.trim();
    if (!filename) return;
    const btn = document.getElementById("load-btn");
    btn.textContent = "Loading…";
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/load`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ csv_path: filename }),
      });
      const data = await res.json();
      addMessage("bot", res.ok
        ? `✅ ${data.message}`
        : `⚠️ ${data.detail}`
      );
      checkHealth();
    } catch {
      addMessage("bot", "⚠️ Could not reach the backend to load CSV.");
    }
    btn.textContent = "Load";
    btn.disabled = false;
  });
</script>
</body>
</html>
